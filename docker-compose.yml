version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8080}:8080"

  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    env_file: .env
    depends_on:
      - rag-service
      - cv-service

  rag-service:
    build: ./rag-service
    ports:
      - "${RAG_PORT:-8001}:8001"
    env_file: .env
    volumes:
      - ./rag-service/data:/app/data
      - ./rag-service/chroma_db:/app/chroma_db

  cv-service:
    build: ./cv-service
    ports:
      - "${CV_PORT:-8002}:8002"
    env_file: .env
    volumes:
      - ./cv-service/data:/app/data
