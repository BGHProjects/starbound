version: "3.9"

services:

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - GATEWAY_PORT=8000
    volumes:
      - gateway-data:/app/internal/db
    networks:
      - starbound
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  rag-service:
    build:
      context: .
      dockerfile: docker/rag.Dockerfile
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - starbound
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  cv-service:
    build:
      context: .
      dockerfile: docker/cv.Dockerfile
    ports:
      - "8002:8002"
    networks:
      - starbound
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "80:80"
    networks:
      - starbound
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  gateway-data:

networks:
  starbound:
    driver: bridge
